<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EDMFire Admin - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="login-title">EDMFire Admin</h1>
      <p class="login-subtitle">Sign in to manage your platform</p>

      <div class="login-form">
        <div class="login-field">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a5d72" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="adminEmail" placeholder="Admin email" autocomplete="email">
        </div>
        <div class="login-field">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a5d72" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password">
        </div>
        <button class="login-btn" id="loginBtn">Sign In</button>
        <p class="login-error" id="loginError"></p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="/api/firebase-config"></script>
  <script src="../firebase/auth.js"></script>
  <script src="login.js"></script>

</body>
</html>
