<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Support Panel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>

<body>

  <!-- Mobile sidebar toggle -->
  <button class="mobile-toggle" id="mobileToggle">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span>Support Chats</span>
    </div>

    <div class="sidebar-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search users...">
    </div>

    <div class="user-list" id="userList">
      <div class="empty-state"><p>Loading users...</p></div>
    </div>
  </div>

  <!-- Chat Section -->
  <div class="chat-section" id="chatSection">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-info">
        <span class="chat-header-name" id="chatHeaderName">Select a user</span>
        <span class="chat-header-status" id="chatHeaderStatus">Choose a conversation</span>
      </div>
    </div>

    <div class="messages" id="messagesContainer">
      <div class="no-chat-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h3>No chat selected</h3>
        <p>Select a user from the sidebar</p>
      </div>
    </div>

    <!-- Reply Bar -->
    <div class="reply-bar" id="replyBar" style="display:none;">
      <div class="reply-content">
        <span class="reply-name" id="replyName"></span>
        <span class="reply-text" id="replyText"></span>
      </div>
      <button class="reply-close" id="replyClose">&times;</button>
    </div>

    <div class="bottom-bar" id="bottomBar" style="display:none;">
      <input type="file" id="imageInput" accept="image/*" hidden>
      <button class="icon-btn" id="imgBtn" title="Send Image">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Image Preview Modal -->
  <div class="image-preview-modal" id="imagePreviewModal" style="display:none;">
    <div class="preview-overlay" id="previewOverlay"></div>
    <div class="preview-content">
      <img id="previewImage" src="" alt="Preview">
      <div class="preview-actions">
        <button class="preview-btn cancel-btn" id="cancelPreview">Cancel</button>
        <button class="preview-btn send-preview-btn" id="sendPreview">Send</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu" style="display:none;">
    <div class="context-menu-item" id="ctxReply">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
      Reply
    </div>
    <div class="context-menu-item" id="ctxCopy">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </div>
    <div class="context-menu-item ctx-delete" id="ctxDelete">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script src="/api/firebase-config"></script>

  <script src="../firebase/auth.js"></script>
  <script src="../firebase/database.js"></script>
  <script src="../firebase/storage.js"></script>

  <script src="admin.js"></script>

</body>
</html>
