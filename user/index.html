<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Help Center</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user.css">
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="header-avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-title">Help Center</div>
        <div class="header-status" id="onlineStatus">Online</div>
      </div>
    </div>
  </div>

  <!-- Chat Container -->
  <div class="chat-container" id="chatContainer">
    <div class="message admin">
      <div class="msg-text">Hello 👋<br>How can we help you?</div>
      <div class="msg-time">Now</div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingIndicator" style="display:none;">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Reply Bar -->
  <div class="reply-bar" id="replyBar" style="display:none;">
    <div class="reply-content">
      <span class="reply-name" id="replyName"></span>
      <span class="reply-text" id="replyText"></span>
    </div>
    <button class="reply-close" id="replyClose">&times;</button>
  </div>

  <!-- Bottom Input Bar -->
  <div class="bottom-bar">
    <input type="file" id="imageInput" accept="image/*" hidden>
    <button class="icon-btn" id="imgBtn" title="Send Image">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button class="icon-btn send-btn" id="sendBtn" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <!-- Image Preview Modal -->
  <div class="image-preview-modal" id="imagePreviewModal" style="display:none;">
    <div class="preview-overlay" id="previewOverlay"></div>
    <div class="preview-content">
      <img id="previewImage" src="" alt="Preview">
      <div class="preview-actions">
        <button class="preview-btn cancel-btn" id="cancelPreview">Cancel</button>
        <button class="preview-btn send-preview-btn" id="sendPreview">Send</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu" style="display:none;">
    <div class="context-menu-item" id="ctxReply">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
      Reply
    </div>
    <div class="context-menu-item" id="ctxCopy">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </div>
    <div class="context-menu-item ctx-delete" id="ctxDelete">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- Firebase Config - API se load hoga (env vars se) -->
  <script src="/api/firebase-config"></script>

  <!-- Firebase Utils -->
  <script src="../firebase/auth.js"></script>
  <script src="../firebase/database.js"></script>
  <script src="../firebase/storage.js"></script>

  <!-- User Chat Logic -->
  <script src="user.js"></script>

</body>
</html>
