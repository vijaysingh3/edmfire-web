<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>EDMFire Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h1 class="login-title">EDMFire Support</h1>
      <p class="login-subtitle">Hosts sign in to help users</p>

      <div class="login-form">
        <div class="login-field">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a5d72" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="helperEmail" placeholder="Your host gmail" autocomplete="email" inputmode="email" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>
        <div class="login-field">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a5d72" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="helperPassword" placeholder="Password" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="login-btn" id="loginBtn">Sign In as Helper</button>
        <p class="login-error" id="loginError"></p>
        <p class="login-hint" id="loginHint">Use the same gmail &amp; password your host account was approved with.</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/api/firebase-config"></script>
  <!-- Security layer MUST be loaded before any app code -->
  <script src="common/security.js"></script>
  <script src="../firebase/auth.js"></script>
  <script src="common/firebase-init.js"></script>
  <script src="common/host-auth.js"></script>
  <script src="login.js"></script>

</body>
</html>
